name: aida Auto Renew

on:
  schedule:
    - cron: '0 */20 * * *'
  workflow_dispatch:
  # 允许在 Actions 页面手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出当前仓库代码，确保工作流能找到 renew.py 文件
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装 Linux 虚拟显示器与系统依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      # 4. 安装 Python 核心依赖库
      - name: Install Python Dependencies
        run: |
          pip install requests undetected-chromedriver selenium

      # 5. 在虚拟显示器中运行续期脚本
      - name: Run Auto Renew Script
        env:
          # 在 xvfb 虚拟屏幕下运行，HEADLESS 必须为 false 才能进行准确的物理点击
          HEADLESS: 'false' 
          # 从 GitHub Secrets 中读取你的安全环境变量
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python renew.py
